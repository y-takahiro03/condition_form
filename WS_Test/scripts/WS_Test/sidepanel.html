                        d="M842.5,828 C849.603,826.848 851.428,838.147 845.5,840 C836.178,842.914 836.079,829.041 842.5,828 Z "
                        fill="rgb(241,241,239)"
                      />
                      <path
                        d="M176.5,829 C185.143,826.694 185.741,839.513 180.5,841 C174.03,842.836 169.832,830.779 176.5,829 Z "
                        fill="rgb(242,243,242)"
                      />
                      <path
                        d="M848.5,850 C858.657,850.45 857.589,870.191 845.5,867 C838.252,865.087 840.099,849.627 848.5,850 Z M846.5,853 C840.865,854.522 842.215,866.667 849.5,865 C855.088,863.721 855.151,850.663 846.5,853 Z "
                        fill="rgb(14,12,13)"
                      />
                      <path
                        d="M171.5,851 C181.403,848.669 183.912,864.826 176.5,867 C164.525,870.513 163.409,852.904 171.5,851 Z M172.5,853 C168.478,853.764 165.703,863.162 171.5,865 C181.554,868.189 180.581,851.465 172.5,853 Z "
                        fill="rgb(7,6,7)"
                      />
                      <path
                        d="M172.5,853 C180.581,851.465 181.554,868.189 171.5,865 C165.703,863.162 168.478,853.764 172.5,853 Z "
                        fill="rgb(244,244,243)"
                      />
                      <path
                        d="M846.5,853 C855.151,850.663 855.088,863.721 849.5,865 C842.215,866.667 840.865,854.522 846.5,853 Z "

                      />
                    </svg>
                  </div>
                  <div class="chip-area">
                    <div
                      class="chip-group"
                      style="margin-top: 12px; justify-content: center"
                    >
                      <button class="chip selectable-part" data-part="首まわり">
                        首まわり
                      </button>
                      <button class="chip selectable-part" data-part="後身頃">
                        後身頃
                      </button>
                      <button class="chip selectable-part" data-part="後右袖">
                        後右袖
                      </button>
                      <button class="chip selectable-part" data-part="後左袖">
                        後左袖
                      </button>
                      <button class="chip selectable-part" data-part="後裾">
                        後裾
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <p id="selected-part-name">選択部位: なし</p>
        </section>

        <section id="severity-selector">
          <h4>程度・範囲</h4>
          <div class="chip-group" id="severity-chips">
            <button class="chip-single" data-value="全体">全体</button>
            <button class="chip-single" data-value="一部">一部</button>
            <button class="chip-single" data-value="所々">所々</button>
            <button class="chip-single" data-value="多数">多数</button>
          </div>
        </section>
        <section id="damage-selector">
          <h4>損傷内容</h4>
          <div class="chip-group" id="damage-chips">
            <button class="chip" data-value="擦れ">擦れ</button>
            <button class="chip" data-value="汚れ">汚れ</button>
            <button class="chip" data-value="破れ">破れ</button>
            <button class="chip" data-value="毛羽立ち">毛羽立ち</button>
            <button class="chip" data-value="毛玉">毛玉</button>
            <button class="chip" data-value="傷">傷</button>
            <button class="chip" data-value="穴">穴</button>
            <button class="chip" data-value="糸引き">糸引き</button>
            <button class="chip" data-value="ほつれ">ほつれ</button>
            <button class="chip" data-value="シミ">シミ</button>
            <button class="chip" data-value="日焼け">日焼け</button>
            <button class="chip" data-value="色あせ">色あせ</button>
            <button class="chip" data-value="変色">変色</button>
          </div>
        </section>
        <section id="output-area">
          <textarea
            id="result-text"
            placeholder="ここに文章が生成されます"
          ></textarea>
          <div class="action-buttons">
            <button id="copy-btn">フォームに転記</button>
            <button id="clear-btn">クリア</button>
          </div>
        </section>
      </div>
      <div id="favorite-list-view" style="display: none">
        <div class="view-header">
          <button id="btn-fav-back-main" class="text-btn">戻る</button>
          <h3 style="margin: 0"></h3>
          <!-- 見出しはなしにする -->
          <button id="btn-fav-add-new" class="icon-btn plus-btn">+</button>
        </div>
        <div id="favorite-items-container" class="list-container"></div>
        <section id="output-area-fav">
          <div class="action-buttons">
            <button id="fav-copy-btn">選択した文字を転記</button>
          </div>
        </section>
      </div>
      <div id="favorite-add-view" style="display: none">
        <div class="view-header">
          <button id="btn-fav-back-list" class="text-btn">戻る</button>
          <h3 style="margin: 0">文字を登録</h3>
          <div style="width: 32px"></div>
        </div>
        <div class="form-container">
          <textarea
            id="new-fav-text"
            placeholder="登録したい文字を入力してください"
          ></textarea>
          <button id="btn-fav-save" class="primary-btn">保存</button>
        </div>
      </div>
    </div>
    <script src="scripts/app.js"></script>
  </body>
</html>
